<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Single Card View</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #fefaf3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card-container {
      width: 90%;
      max-width: 600px;
      background-color: #fffaf0;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      padding: 60px 16px 24px 16px;
      position: relative;
      overflow: visible; 
    }

    .back-button, .prev-button, .next-button {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      position: absolute;
      top: 16px;
      z-index: 2;
    }

    .back-button { left: 16px; }
    .prev-button { left: 60px; }
    .next-button { right: 16px; }

    .deck-name, .card-name {
      text-align: center;
      margin: 8px 0;
    }

    .carousel-wrapper {
      overflow: visible; 
      width: 100%;
      margin: 20px 0;
      min-height: 380px; 
    }

    .carousel {
      display: flex;
      transition: transform 0.5s ease;
      align-items: flex-start; 
    }

    .card {
      min-width: 33.33%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
      transition: transform 0.5s ease;
      min-height: 320px;
    }

    .card-image {
      width: 140px;
      height: 210px;
      border: 3px solid black;
      border-radius: 12px;
      background-color: #eee;
      margin-bottom: 12px;
    }

    .main {
      transform: scale(1.2); 
      z-index: 1;
    }

    .card-info {
      text-align: center;
      line-height: 1.4;
      font-size: 14px;
      min-height: 80px;
    }

    .manage-button {
      display: block;
      margin: 24px auto 0 auto;
      padding: 8px 16px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background-color: #fff;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      .card-image {
        width: 90px;
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <div class="card-container">
    <button class="back-button" onclick="goBack()">←</button>
    <button class="prev-button" onclick="prevCard()">◀</button>
    <button class="next-button" onclick="nextCard()">▶</button>

    <h2 class="deck-name" id="deckName">Deck: Pikachu's Team</h2>

    <div class="carousel-wrapper">
      <div class="carousel" id="carousel">
      </div>
    </div>

    <button class="manage-button" onclick="manageCard()">Manage</button>
  </div>

  <script>
    const cards = [
      { name: "Pikachu", type: "Electric", rarity: "Rare", generation: "Gen 1" },
      { name: "Eevee", type: "Normal", rarity: "Common", generation: "Gen 1" },
      { name: "Charmander", type: "Fire", rarity: "Rare", generation: "Gen 1" },
      { name: "Bulbasaur", type: "Grass", rarity: "Uncommon", generation: "Gen 1" },
      { name: "Squirtle", type: "Water", rarity: "Rare", generation: "Gen 1" }
    ];

    let currentIndex = 0;
    const carousel = document.getElementById("carousel");

    function renderCards() {
      carousel.innerHTML = "";

      for (let i = -1; i <= 1; i++) {
        let index = (currentIndex + i + cards.length) % cards.length;
        const card = cards[index];

        const cardDiv = document.createElement("div");
        cardDiv.className = "card";
        if (i === 0) cardDiv.classList.add("main");

        cardDiv.innerHTML = `
          <div class="card-image"></div>
          <div class="card-info">
            <div>${card.name}</div>
            <div>${card.type}</div>
            <div>${card.rarity}</div>
            <div>${card.generation}</div>
          </div>
        `;

        carousel.appendChild(cardDiv);
      }
    }

    function prevCard() {
      currentIndex = (currentIndex - 1 + cards.length) % cards.length;
      animateCarousel();
    }

    function nextCard() {
      currentIndex = (currentIndex + 1) % cards.length;
      animateCarousel();
    }

    function animateCarousel() {
      carousel.style.transition = "transform 0.5s ease";
      carousel.style.transform = "translateX(-33.33%)";
      setTimeout(() => {
        carousel.style.transition = "none";
        carousel.style.transform = "translateX(0)";
        renderCards();
      }, 500);
    }

    function goBack() {
      alert("Going back to Card View...");
    }

    function manageCard() {
      alert("Manage card features not implemented yet.");
    }

    renderCards();
  </script>
</body>
</html>
